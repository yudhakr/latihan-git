<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid</title>
    <style>
        .container
        {
        display: grid;
        grid-template-columns: 1fr  2fr 1fr 1fr ;
        }
        .box{
        border: 2px solid black; min-height: 100px; width: 100%; font-size: 50px;
       min-height: 100px;
        width: 100%;
        font-size: 50px;
    }
    </style>
  </head>
  <body>
    
<div class="container">
<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>
<div class="box">4</div>
<div class="box">5</div>
</div>
    </div>
  </body>
</html>
