<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f1f3f5;
            width: 1440px;
            height: 900px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 400px;
            height: 450px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card h1 {
            font-size: 24px;
            font-weight: 600;
            color: #212529;
            margin-bottom: 32px;
        }
        .input-field {
            width: 340px;
            height: 45px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            padding: 0 14px;
            font-size: 14px;
            color: #212529;
            outline: none;
            margin-bottom: 16px;
            transition: 0.2s;
        }
        .input-field::placeholder {
            color: #868e96;
            font-size: 14px;
        }
        .input-field:focus {
            border-color: #007bff;
        }
        .btn-login {
            width: 340px;
            height: 45px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: #0069d9;
        }
        .link-register {
            margin-top: 20px;
            font-size: 13px;
            color: #868e96;
        }
        .link-register a {
            color: #007bff;
            text-decoration: none;
            font-weight: 500;
        }
        .link-register a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Masuk</h1>
        <form id="loginForm" style="display:flex;flex-direction:column;align-items:center;width:100%;">
            <input class="input-field" id="username" type="text" placeholder="Username" required>
            <input class="input-field" id="password" type="password" placeholder="Password" required>
            <button class="btn-login" type="submit">Login</button>
        </form>
        <p class="link-register">Belum punya akun? <a href="#">Daftar</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (username === 'admin' && password === 'admin') {
                window.location.href = 'dashboard.html?user=' + encodeURIComponent(username);
            } else {
                alert('Username atau password salah!');
            }
        });
    </script>
</body>
</html>
