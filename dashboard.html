<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f1f3f5 0%, #a0a5aa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            width: 550px;
            min-height: 600px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .navbar .username {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-logout:hover {
            background: #c82333;
        }
        .header {
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 22px;
            color: #333;
            font-weight: 700;
        }
        .header p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #667eea;
        }
        .input-group button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .input-group button:hover {
            background: #5a67d8;
        }
        .task-stats {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .task-stats span {
            font-size: 13px;
            color: #888;
        }
        .task-stats strong {
            color: #333;
        }
        .task-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
        }
        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: 0.2s;
        }
        .task-item:hover {
            background: #f1f3f5;
        }
        .task-item.done {
            opacity: 0.6;
        }
        .task-item.done .task-text {
            text-decoration: line-through;
            color: #999;
        }
        .task-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }
        .task-text {
            flex: 1;
            font-size: 14px;
            color: #333;
        }
        .task-delete {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 0 4px;
            opacity: 0.5;
            transition: 0.2s;
        }
        .task-delete:hover {
            opacity: 1;
        }
        .empty-state {
            text-align: center;
            color: #bbb;
            padding: 40px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="navbar">
            <span class="username" id="displayUser">Halo, User</span>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>

        <div class="header">
            <h1>Task Manager</h1>
            <p>Kelola tugas harian kamu</p>
        </div>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Tambahkan tugas baru..." autofocus>
            <button id="addBtn">+ Tambah</button>
        </div>

        <div class="task-stats">
            <span>Total: <strong id="totalCount">0</strong></span>
            <span>Selesai: <strong id="doneCount">0</strong></span>
        </div>

        <ul class="task-list" id="taskList">
            <li class="empty-state">Belum ada tugas. Tambahkan tugas baru di atas!</li>
        </ul>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user');
        if (!username) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('displayUser').textContent = 'Halo, ' + username;
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            window.location.href = 'login.html';
        });

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const totalCount = document.getElementById('totalCount');
        const doneCount = document.getElementById('doneCount');

        function updateStats() {
            const items = document.querySelectorAll('.task-item');
            const done = document.querySelectorAll('.task-item.done');
            totalCount.textContent = items.length;
            doneCount.textContent = done.length;
        }

        function showEmptyState() {
            if (document.querySelectorAll('.task-item').length === 0) {
                const li = document.createElement('li');
                li.className = 'empty-state';
                li.textContent = 'Belum ada tugas. Tambahkan tugas baru di atas!';
                taskList.appendChild(li);
            }
        }

        function saveTasks() {
            const tasks = [];
            document.querySelectorAll('.task-item').forEach(item => {
                const text = item.querySelector('.task-text').textContent;
                const done = item.classList.contains('done');
                tasks.push({ text, done });
            });
            localStorage.setItem('tasks_' + username, JSON.stringify(tasks));
        }

        function loadTasks() {
            const saved = localStorage.getItem('tasks_' + username);
            if (saved) {
                const tasks = JSON.parse(saved);
                tasks.forEach(t => addTask(t.text, t.done));
            }
        }

        function addTask(text, isDone) {
            const empty = document.querySelector('.empty-state');
            if (empty) empty.remove();

            const li = document.createElement('li');
            li.className = 'task-item' + (isDone ? ' done' : '');

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = !!isDone;
            cb.addEventListener('change', () => {
                li.classList.toggle('done', cb.checked);
                updateStats();
                saveTasks();
            });

            const span = document.createElement('span');
            span.className = 'task-text';
            span.textContent = text;

            const delBtn = document.createElement('button');
            delBtn.className = 'task-delete';
            delBtn.innerHTML = '&times;';
            delBtn.addEventListener('click', () => {
                li.remove();
                updateStats();
                saveTasks();
                showEmptyState();
            });

            li.appendChild(cb);
            li.appendChild(span);
            li.appendChild(delBtn);
            taskList.appendChild(li);
            updateStats();
        }

        addBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (text) {
                addTask(text);
                saveTasks();
                taskInput.value = '';
                taskInput.focus();
            }
        });

        taskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                addBtn.click();
            }
        });

        loadTasks();
    </script>
</body>
</html>
