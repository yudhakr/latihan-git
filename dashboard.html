<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="header">
            <span id="displayUser">Halo, User</span>
            <button class="btn-logout" id="logoutBtn">Log out</button>
        </div>

        <h2>Task Manager</h2>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Tambah Tugas Baru">
            <button class="btn-add" id="addBtn"><b>+</b> Tambah</button>
        </div>

        <div class="stats">
            <span>Total : <strong id="totalCount">0</strong></span>
            <span>Selesai : <strong id="doneCount">0</strong></span>
        </div>

        <ul class="task-list" id="taskList">
            <li class="empty-state">Belum ada tugas. Tambahkan tugas baru di atas!</li>
        </ul>

        <button class="btn-masuk" id="masukBtn">Masuk</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user');
        if (!username) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('displayUser').textContent = 'Halo, ' + username;
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            window.location.href = 'login.html';
        });

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const totalCount = document.getElementById('totalCount');
        const doneCount = document.getElementById('doneCount');

        function updateStats() {
            const items = document.querySelectorAll('.task-item');
            const done = document.querySelectorAll('.task-item.done');
            totalCount.textContent = items.length;
            doneCount.textContent = done.length;
        }

        function showEmptyState() {
            if (document.querySelectorAll('.task-item').length === 0) {
                const li = document.createElement('li');
                li.className = 'empty-state';
                li.textContent = 'Belum ada tugas. Tambahkan tugas baru di atas!';
                taskList.appendChild(li);
            }
        }

        function saveTasks() {
            const tasks = [];
            document.querySelectorAll('.task-item').forEach(item => {
                const text = item.querySelector('.task-text').textContent;
                const done = item.classList.contains('done');
                tasks.push({ text, done });
            });
            localStorage.setItem('tasks_' + username, JSON.stringify(tasks));
        }

        function loadTasks() {
            const saved = localStorage.getItem('tasks_' + username);
            if (saved) {
                const tasks = JSON.parse(saved);
                tasks.forEach(t => addTask(t.text, t.done));
            }
        }

        function addTask(text, isDone) {
            const empty = document.querySelector('.empty-state');
            if (empty) empty.remove();

            const li = document.createElement('li');
            li.className = 'task-item' + (isDone ? ' done' : '');

            const content = document.createElement('div');
            content.className = 'task-content';

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = !!isDone;
            cb.addEventListener('change', () => {
                li.classList.toggle('done', cb.checked);
                span.classList.toggle('completed-text', cb.checked);
                updateStats();
                saveTasks();
            });

            const span = document.createElement('span');
            span.className = 'task-text' + (isDone ? ' completed-text' : '');
            span.textContent = text;

            content.appendChild(cb);
            content.appendChild(span);

            const actions = document.createElement('div');
            actions.className = 'task-actions';

            const editBtn = document.createElement('button');
            editBtn.className = 'btn-edit';
            editBtn.textContent = 'Edit';
            editBtn.addEventListener('click', () => {
                const newText = prompt('Edit tugas:', span.textContent);
                if (newText !== null && newText.trim() !== '') {
                    span.textContent = newText.trim();
                    saveTasks();
                }
            });

            const delBtn = document.createElement('button');
            delBtn.className = 'btn-delete';
            delBtn.textContent = 'Hapus';
            delBtn.addEventListener('click', () => {
                li.remove();
                updateStats();
                saveTasks();
                showEmptyState();
            });

            actions.appendChild(editBtn);
            actions.appendChild(delBtn);

            li.appendChild(content);
            li.appendChild(actions);
            taskList.appendChild(li);
            updateStats();
        }

        addBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (text) {
                addTask(text);
                saveTasks();
                taskInput.value = '';
                taskInput.focus();
            }
        });

        taskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                addBtn.click();
            }
        });

        loadTasks();
    </script>
</body>
</html>
